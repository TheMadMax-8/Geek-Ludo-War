name: Automated ML Retraining Pipeline

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  retrain-models:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pandas scikit-learn pymongo
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        
    - name: Extract Data and Engineer Features
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: python ml/feature_engineering.py
      
    - name: Train Deep Clustering Model
      run: python ml/train_model.py

    - name: Evaluate Model (Accuracy/F1)
      run: python ml/evaluate.py
      
    - name: Commit and Push Updated ML Models
      run: |
        git config --global user.name "ML-Ops-Bot"
        git config --global user.email "ml-ops@geekludo.local"
        git add ml/*.pkl ml/*.pth ml/*.csv ml/evaluation_logs.txt
        git commit -m "🤖 Auto-Retrain: Updated Models & Metrics" || echo "No Commit Needed"
        git push
